<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台管理 · {{ project_name }}</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="container admin-layout">
    <section class="panel">
      <div class="panel-head">
        <div>
          <p class="section-tag">管理后台</p>
          <h1>{{ project_name }}</h1>
        </div>
        <button id="admin-refresh" class="btn btn-primary" type="button">刷新面板</button>
      </div>
      <p class="muted">
        若服务器设置了管理员口令，请在下方输入后查看统计。未设置口令时可直接查看。
      </p>
      <div class="admin-auth">
        <input id="admin-password" type="password" placeholder="管理员口令（可留空）" />
      </div>
      <div id="admin-stats" class="stats-grid"></div>
      <p class="muted admin-hint">⚠️ 后台支持删除最近识别记录；删除前会弹出确认，删除后会同步移除对应图片文件。</p>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <p class="section-tag">最近结果</p>
          <h2>近 10 条识别记录</h2>
        </div>
      </div>
      <div id="admin-recent" class="history-grid"></div>
    </section>
  </main>
  <script src="/static/admin.js"></script>
</body>
</html>
